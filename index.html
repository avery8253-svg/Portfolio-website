  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Artwork viewer" hidden>
    <button class="lightbox-close" aria-label="Close">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <button class="lightbox-prev" id="lightbox-prev" aria-label="Previous image">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>

    <button class="lightbox-next" id="lightbox-next" aria-label="Next image">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
    <div class="lightbox-content">
      <div class="lightbox-image-wrap">
        <img class="lightbox-image" id="lightbox-image" src="" alt="">
        <p class="lightbox-image-label" id="lightbox-image-label"></p>
      </div>
      <div class="lightbox-info" id="lightbox-info">
        <h3 class="lightbox-title" id="lightbox-title"></h3>
        <p class="lightbox-subtitle" id="lightbox-subtitle"></p>
        <p class="lightbox-description" id="lightbox-description"></p>
